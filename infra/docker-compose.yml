services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: upscale
      POSTGRES_PASSWORD: upscale
      POSTGRES_DB: upscale
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: ..
      dockerfile: infra/dockerfiles/api.Dockerfile
    environment:
      DATABASE_URL: postgresql://upscale:upscale@postgres:5432/upscale
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /app/storage
      ENQUEUE_JOBS: "true"
    ports:
      - "8000:8000"
    volumes:
      - ../storage:/app/storage
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ..
      dockerfile: infra/dockerfiles/api.Dockerfile
    command: rq worker upscale --url redis://redis:6379/0
    environment:
      DATABASE_URL: postgresql://upscale:upscale@postgres:5432/upscale
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /app/storage
      ENQUEUE_JOBS: "true"
    volumes:
      - ../storage:/app/storage
    depends_on:
      - api
      - redis

  web:
    build:
      context: ..
      dockerfile: infra/dockerfiles/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
